name: AI Screenshot Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'app/src/main/**/ui/**'
      - 'app/src/main/**/theme/**'
      - '**/res/values/colors.xml'
      - '**/res/layout/**'

concurrency:
  group: screenshot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  ai-screenshot-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Setup CML
        uses: iterative/setup-cml@v3

      - name: Fetch base screenshots
        env:
          GH_TOKEN: ${{ secrets.SCREENSHOT_REPO_TOKEN }}
        run: |
          BASE_HASH=$(git rev-parse --short "origin/${{ github.base_ref }}")
          SCREENSHOT_REPO="taiseidev/screenshot-test-playground-screenshots"
          BRANCH="base-${BASE_HASH}"

          echo "Base hash: ${BASE_HASH}, Branch: ${BRANCH}"

          if gh api "repos/${SCREENSHOT_REPO}/branches/${BRANCH}" &>/dev/null; then
            echo "Base images found, downloading..."
            git clone --branch "${BRANCH}" --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${SCREENSHOT_REPO}.git" \
              /tmp/base-screenshots
            cp /tmp/base-screenshots/app/screenshots/*.png app/screenshots/
            echo "Copied $(ls app/screenshots/*.png | wc -l) baseline images"
          else
            echo "Base images not found for ${BRANCH}"
            echo "Generating base images..."
            WORK_DIR=$(pwd)
            git checkout "origin/${{ github.base_ref }}"
            ./gradlew recordRoborazziDebug --parallel
            # Push to external repo
            cd /tmp && rm -rf screenshot-push && mkdir screenshot-push && cd screenshot-push
            git init
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              checkout --orphan "${BRANCH}"
            mkdir -p app/screenshots
            cp "${WORK_DIR}"/app/screenshots/*.png app/screenshots/
            git add .
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "Baselines for ${BASE_HASH}"
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${SCREENSHOT_REPO}.git"
            git push origin "${BRANCH}"
            cd "${WORK_DIR}"
            git checkout - 2>/dev/null || true
          fi

      - name: AI Screenshot Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools Bash,Read,Glob,Grep,Write,Edit'
          prompt: |
            /review-ui を実行してください。
            CI環境です。環境変数 REPO_TOKEN が利用可能です。
            ベースライン画像は app/screenshots/ に配置済みです。
        env:
          REPO_TOKEN: ${{ github.token }}
