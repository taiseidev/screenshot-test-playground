name: AI Screenshot Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: screenshot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Step 1: スクリーンショット差分検出 + 画像付きPRコメント投稿
  screenshot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compare Screenshots
        run: ./gradlew compareRoborazziDebug

      - name: Upload Screenshot Diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: |
            app/build/outputs/roborazzi/*_compare.png
            app/build/outputs/roborazzi/*_actual.png
          if-no-files-found: ignore

      - name: Push diff images to branch
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ROBO_DIR="app/build/outputs/roborazzi"
          COMPARE_FILES=$(find "$ROBO_DIR" -name "*_compare.png" 2>/dev/null)

          if [ -z "$COMPARE_FILES" ]; then
            echo "差分画像なし — スキップ"
            exit 0
          fi

          BRANCH="screenshot-diffs/pr-${PR_NUMBER}"

          # orphanブランチを作成して画像をコミット
          git checkout --orphan "$BRANCH"
          git rm -rf --quiet . 2>/dev/null || true

          mkdir -p screenshots
          cp "$ROBO_DIR"/*_compare.png screenshots/ 2>/dev/null || true
          cp "$ROBO_DIR"/*_actual.png screenshots/ 2>/dev/null || true

          git add screenshots/
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Screenshot diffs for PR #${PR_NUMBER}" --allow-empty

          git push origin "$BRANCH" --force

          # 元のブランチに戻る
          git checkout -

      - name: Post Screenshot Report to PR
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const prNumber = process.env.PR_NUMBER;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- screenshot-diff-report -->';
            const branch = `screenshot-diffs/pr-${prNumber}`;
            const rawBase = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/screenshots`;

            // compare画像を探す
            const roboDir = 'app/build/outputs/roborazzi';
            const compareFiles = fs.existsSync(roboDir)
              ? fs.readdirSync(roboDir)
                  .filter(f => f.endsWith('_compare.png'))
                  .map(f => path.join(roboDir, f))
              : [];

            if (compareFiles.length === 0) {
              console.log('差分画像なし');
              return;
            }

            let body = marker + '\n## 📸 Screenshot Diff Report\n\n';

            for (const filePath of compareFiles.sort()) {
              const fileName = path.basename(filePath);
              const testName = path.basename(filePath, '_compare.png');
              const actualFile = fileName.replace('_compare.png', '_actual.png');
              const hasActual = fs.existsSync(path.join(roboDir, actualFile));

              body += `### ${testName}\n\n`;

              if (hasActual) {
                body += '🔴 **差分あり**\n\n';
              } else {
                body += '🟢 **差分なし**\n\n';
              }

              // compare画像を埋め込み（Reference | Diff | New の3列画像）
              const imageUrl = `${rawBase}/${fileName}`;
              body += `![${testName}](${imageUrl})\n\n`;
            }

            body += '---\n';
            body += '🤖 AIレビューが続けて実行されます。\n';

            // 既存コメントを探して更新 or 新規作成
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: Number(prNumber),
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: Number(prNumber),
                body,
              });
            }

  # Step 2: AIによる影響範囲分析 + 差分画像レビュー
  ai-review:
    runs-on: ubuntu-latest
    needs: screenshot-test
    if: always()
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: screenshot-diffs
          path: screenshot-diffs/
        continue-on-error: true

      - name: AI Screenshot Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            このPRのUI変更をレビューしてください。以下のステップで実行してください。

            ## Step 1: 影響範囲分析
            1. git diff で変更ファイルを確認（ベースブランチは環境変数 BASE_REF を参照）
            2. 変更内容を読み取り、何が変わったかを把握
            3. Grepで依存を辿り、影響する画面を特定
            4. 影響しない画面とその理由も明記

            ## Step 2: 差分画像の確認
            screenshot-diffs/ 配下に差分画像（*_compare.png）がある場合:
            1. Readツールで各差分画像を読み取る（マルチモーダル）
            2. Reference（変更前）とNew（変更後）の違いを分析
            3. レイアウト崩れ、色のコントラスト問題がないか確認

            差分画像がない場合は、コード変更のみから影響範囲を分析してください。

            ## Step 3: 判定とレポート
            以下のフォーマットでレポートを作成してください:

            ## 🤖 AI UIレビュー結果

            ### 影響範囲分析
            | コンポーネント/画面 | 影響有無 | 理由 |
            |---|---|---|

            ### スクリーンショット差分分析
            差分画像を読み取った場合、各画像について:
            - 変更前後の違いの説明
            - デザイン観点の評価（色、レイアウト、コントラスト等）

            | テスト名 | 判定 | 詳細 |
            |---|---|---|

            判定基準:
            - ✅ 意図した変更（問題なし）
            - ⚠️ 要確認（コントラスト、アクセシビリティ等の懸念）
            - ❌ レグレッション（意図しない変更）

            ### 総合判定
            変更全体の安全性を評価し、マージ可否の推奨を記載してください。
