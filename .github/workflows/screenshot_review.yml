name: AI Screenshot Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: screenshot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # Step 1: スクリーンショット差分検出 + 画像付きPRコメント投稿
  screenshot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compare Screenshots
        run: ./gradlew compareRoborazziDebug

      - name: Upload Screenshot Diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: |
            app/build/outputs/roborazzi/*_compare.png
            app/build/outputs/roborazzi/*_actual.png
          if-no-files-found: ignore

      - name: Post Screenshot Report to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const glob = require('@actions/glob');

            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- screenshot-diff-report -->';

            // compare画像を探す
            const globber = await glob.create('app/build/outputs/roborazzi/*_compare.png');
            const compareFiles = await globber.glob();

            if (compareFiles.length === 0) {
              console.log('差分画像なし');
              return;
            }

            let body = marker + '\n## 📸 Screenshot Diff Report\n\n';

            for (const filePath of compareFiles.sort()) {
              const testName = path.basename(filePath, '_compare.png');

              // 画像をGitHubにアップロード
              const imageData = fs.readFileSync(filePath);
              const base64 = imageData.toString('base64');
              const dataUri = `data:image/png;base64,${base64}`;

              // GitHub issue comment用に画像をアップロード
              // まずダミーissueコメントで画像をアップロードし、URLを取得する代わりに
              // compare画像をbase64でdetailsタグ内に埋め込む
              const actualPath = filePath.replace('_compare.png', '_actual.png');
              const hasActual = fs.existsSync(actualPath);

              body += `### ${testName}\n\n`;

              if (hasActual) {
                body += '🔴 **差分あり**\n\n';
              } else {
                body += '🟢 **差分なし**\n\n';
              }
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            body += `---\n📦 [差分画像の詳細を見る（Artifacts）](${runUrl})\n\n`;
            body += '🤖 AIレビューが続けて実行されます。\n';

            // 既存コメントを探す
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

  # Step 2: AIによる影響範囲分析 + 差分画像レビュー
  ai-review:
    runs-on: ubuntu-latest
    needs: screenshot-test
    if: always()
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: screenshot-diffs
          path: screenshot-diffs/
        continue-on-error: true

      - name: AI Screenshot Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            このPRのUI変更をレビューしてください。以下のステップで実行してください。

            ## Step 1: 影響範囲分析
            1. git diff で変更ファイルを確認（ベースブランチは環境変数 BASE_REF を参照）
            2. 変更内容を読み取り、何が変わったかを把握
            3. Grepで依存を辿り、影響する画面を特定
            4. 影響しない画面とその理由も明記

            ## Step 2: 差分画像の確認
            screenshot-diffs/ 配下に差分画像（*_compare.png）がある場合:
            1. Readツールで各差分画像を読み取る（マルチモーダル）
            2. Reference（変更前）とNew（変更後）の違いを分析
            3. レイアウト崩れ、色のコントラスト問題がないか確認

            差分画像がない場合は、コード変更のみから影響範囲を分析してください。

            ## Step 3: 判定とレポート
            以下のフォーマットでレポートを作成してください:

            ## 🤖 AI UIレビュー結果

            ### 影響範囲分析
            | コンポーネント/画面 | 影響有無 | 理由 |
            |---|---|---|

            ### スクリーンショット差分分析
            差分画像を読み取った場合、各画像について:
            - 変更前後の違いの説明
            - デザイン観点の評価（色、レイアウト、コントラスト等）

            | テスト名 | 判定 | 詳細 |
            |---|---|---|

            判定基準:
            - ✅ 意図した変更（問題なし）
            - ⚠️ 要確認（コントラスト、アクセシビリティ等の懸念）
            - ❌ レグレッション（意図しない変更）

            ### 総合判定
            変更全体の安全性を評価し、マージ可否の推奨を記載してください。
