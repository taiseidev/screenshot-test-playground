name: AI Screenshot Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: screenshot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Step 1: スクリーンショット差分検出 + 画像をGitHub CDNにアップロード
  screenshot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compare Screenshots
        run: ./gradlew compareRoborazziDebug

      - name: Setup CML
        if: always()
        uses: iterative/setup-cml@v3

      - name: Upload images and save URLs
        id: upload-images
        if: always()
        env:
          REPO_TOKEN: ${{ github.token }}
        run: |
          ROBO_DIR="app/build/outputs/roborazzi"
          COMPARE_FILES=$(find "$ROBO_DIR" -name "*_compare.png" 2>/dev/null | sort)

          if [ -z "$COMPARE_FILES" ]; then
            echo "差分画像なし"
            echo "has_diffs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_diffs=true" >> "$GITHUB_OUTPUT"

          # 各画像をGitHub CDNにアップロードしてURL一覧を作成
          mkdir -p /tmp/screenshot-urls
          IMAGE_MAP=""

          for FILE in $COMPARE_FILES; do
            FILENAME=$(basename "$FILE")
            TEST_NAME=$(basename "$FILE" _compare.png)

            # cml publishでCDNにアップロード → URLが返る
            CDN_URL=$(cml publish "$FILE")
            IMAGE_MAP="${IMAGE_MAP}${TEST_NAME}|${CDN_URL}\n"
            echo "${TEST_NAME}: ${CDN_URL}"
          done

          # URL一覧をファイルに保存（AI jobで参照）
          printf "$IMAGE_MAP" > /tmp/screenshot-urls/image_urls.txt

      - name: Upload URL mapping
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-urls
          path: /tmp/screenshot-urls/image_urls.txt
          if-no-files-found: ignore

      - name: Upload Screenshot Diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: |
            app/build/outputs/roborazzi/*_compare.png
            app/build/outputs/roborazzi/*_actual.png
          if-no-files-found: ignore

  # Step 2: AIが影響分析 + 画像読み取り + デザインレビューを統合レポートとして投稿
  ai-review:
    runs-on: ubuntu-latest
    needs: screenshot-test
    if: always()
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: screenshot-diffs
          path: screenshot-diffs/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: screenshot-urls
          path: screenshot-urls/
        continue-on-error: true

      - name: AI Screenshot Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            あなたはUI変更のレビュー専門家です。このPRのUI変更について、影響範囲分析・スクリーンショット差分のデザインレビュー・テストカバレッジの確認を行い、1つの統合レポートを作成してください。

            ## 環境情報
            - ベースブランチ: 環境変数 BASE_REF を参照
            - 差分画像: screenshot-diffs/ 配下の *_compare.png
            - 画像CDN URL一覧: screenshot-urls/image_urls.txt（形式: テスト名|CDN_URL）

            ## Step 1: コード変更の把握
            1. git diff でベースブランチとの変更ファイル・変更内容を確認
            2. 何が変わったのか（色、レイアウト、コンポーネント等）を正確に把握

            ## Step 2: 影響範囲の網羅的な特定
            変更されたコードから依存関係を辿り、影響するコンポーネント・画面を特定してください。
            1. 変更されたファイルを直接参照しているコンポーネントをGrepで探す
            2. そのコンポーネントを使っている画面をさらにGrepで探す
            3. 類似のコンポーネントも確認し、「影響しない」場合はその根拠を説明する

            **重要**: 「影響あり」だけでなく「影響なし」の根拠も示すこと。

            ## Step 3: 差分画像のデザインレビュー
            screenshot-diffs/ 配下に差分画像（*_compare.png）がある場合:
            1. Readツールで各差分画像を読み取る（マルチモーダル対応）
            2. 変更前後の違いを具体的に分析
            3. デザイン観点で評価（コントラスト比、レイアウト崩れ、ダークテーマ等）

            ## Step 4: テストカバレッジの確認
            1. app/src/test/ 配下のスクリーンショットテストを確認
            2. 影響を受けるのにテストがないコンポーネント/画面を特定

            ## Step 5: レポート出力
            以下のフォーマットで出力してください。

            **重要: 画像の埋め込み方法**
            screenshot-urls/image_urls.txt を読み取り、各テスト名に対応するCDN URLを取得してください。
            レポート内では `![テスト名](CDN_URL)` の形式で画像を埋め込んでください。
            これによりPRコメント上で画像が直接表示されます。

            ---

            ## 🤖 AI駆動UIレビュー

            ### 変更概要
            （何がどう変わったかを1-2行で説明）

            ### 影響範囲分析

            #### ⭕ 影響あり
            | コンポーネント/画面 | 影響の理由 | テストカバレッジ |
            |---|---|---|
            （テストカバレッジは「✅ スクショテストあり」「❌ テストなし（手動確認必要）」）

            #### ➖ 影響なし
            | コンポーネント/画面 | 影響なしの根拠 |
            |---|---|

            ### スクリーンショット差分
            各テストについて以下を記載:

            #### {テスト名}
            **判定**: ✅ / ⚠️ / ❌
            **分析**: （変更前後の違いの説明、デザイン観点の評価）

            ![テスト名](CDN_URL)

            判定基準:
            - ✅ 意図した変更（問題なし）
            - ⚠️ 要確認（コントラスト、アクセシビリティ等の懸念あり）
            - ❌ レグレッション（意図しない変更）

            ### 手動確認が必要な画面
            テスト未カバーで影響を受ける画面のリスト。
            ない場合は「すべての影響画面がテストでカバーされています」と記載。

            ### 総合判定
            変更全体の安全性とマージ可否の推奨。
